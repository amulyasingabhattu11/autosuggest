<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar{
            position: fixed;
            top: 20px;
            right: 20px;
        }
        .search-section{
            text-align: center;
            margin-top: 100px;
        }
        .colour-txt{
            color:blueviolet;
        }
        .tag-line{
            
            color: #555;
        }
        .search-box{
            padding: 15px 15px 15px 45px;
            border-radius: 30px;
            width: 40%;
        }
        .search-icon{
            position: relative;
            left: 30px;
        }
        #suggestion-box{
            border:1px solid black;
            width: 43%;
            margin-left: 29%;

        }
         #suggestion-item{
            border: 1px solid gray;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div>
    <span class="left-bar">&#x2699;</span>
    <span class="right-bar">&#x2022; online|&#x23F1;-ms</span>
    </div>
    <div class="search-section">
   
    <h1><span class="colour-txt">Being</span>Infinity</h1>
    <p class="tag-line">One million phrases.Four algorithms.Prefix Based Auto Suggest</p>
    
    <span><span class="search-icon">🔍︎</span> <input placeholder="Start typing to search" class="search-box" id="search-box"></span>
    
    <div id="suggestion-box">
        <!-- Suggestions Box -->
    </div>
    </div>
   <script>
     var searchBox=document.getElementById("search-box");
     var suggestionBox=document.getElementById("suggestion-box");
     searchBox.addEventListener("input",function(){
       //1.Get user typed text
       //2.Make api calll to get suggestion
       //3.Display data in HTML
       var userInput=searchBox.value;
       if(userInput.trim()==""){

       }
       else{
        var url=" https://autosuggest-backend.onrender.com/api/autosuggest?q=" + userInput + "&algorithm=brute&limit=10&weighted=false";
        fetch(url)
        .then(function(response){
            return response.json();
        })
        .then(function(data){
            console.log(data);
            var resultArray=data.results;
            var htmlResults="";
            for(var i=0;i<resultArray.length;i++){
                htmlResults+="<div id='suggestion-item'>"+resultArray[i].text+"</div>";
            }
            suggestionBox.innerHTML=htmlResults;
        })
       }
     });
   </script>
    
</body>
</html>
